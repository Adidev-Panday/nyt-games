name: Daily puzzle data update

on:
  schedule:
    - cron: '0 8 * * *'   # 08:00 UTC — first attempt
    - cron: '0 16 * * *'  # 16:00 UTC — safety-net fallback
  workflow_dispatch:       # manual trigger from Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # needed to push back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so git push works cleanly

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run update script
        run: |
          python scripts/update_data.py
          EXIT_CODE=$?
          echo "Script exit code: $EXIT_CODE"
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::update_data.py failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi

      - name: Verify data.json is up to date
        run: |
          if git diff --quiet data.json; then
            echo "data.json is clean — script committed all changes successfully"
          else
            echo "::warning::data.json has uncommitted changes after script ran — committing now as fallback"
            git add data.json
            git commit -m "chore: daily puzzle data update (workflow fallback) [skip ci]"
            git push
          fi
